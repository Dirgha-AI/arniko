version: '3.8'

services:
  arniko:
    build: .
    ports:
      - "3010:3010"
    environment:
      - NODE_ENV=production
      - PORT=3010
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
    depends_on:
      - postgres
      - redis
    networks:
      - arniko-network

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=arniko
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=arniko
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - arniko-network

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    networks:
      - arniko-network

  # Optional: Nginx reverse proxy
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - arniko
    networks:
      - arniko-network

volumes:
  postgres-data:
  redis-data:

networks:
  arniko-network:
    driver: bridge
